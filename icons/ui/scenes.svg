<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer border -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" rx="1"/>
  <!-- Grid lines -->
  <line x1="11" y1="2" x2="11" y2="30" stroke="currentColor" stroke-width="1"/>
  <line x1="21" y1="2" x2="21" y2="30" stroke="currentColor" stroke-width="1"/>
  <line x1="2" y1="11" x2="30" y2="11" stroke="currentColor" stroke-width="1"/>
  <line x1="2" y1="21" x2="30" y2="21" stroke="currentColor" stroke-width="1"/>
  <!-- Sector fills — industrial blocks -->
  <rect x="3" y="3" width="7" height="7" fill="currentColor"/>
  <rect x="13" y="13" width="7" height="7" fill="currentColor" opacity="0.6"/>
  <rect x="22" y="22" width="7" height="7" fill="currentColor"/>
  <rect x="22" y="3" width="7" height="7" fill="currentColor"/>
  <!-- Location marker -->
  <polygon points="16,17 14,21 18,21" fill="currentColor"/>
</svg>