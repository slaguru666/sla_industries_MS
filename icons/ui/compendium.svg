<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cylinder top ellipse -->
  <ellipse cx="16" cy="6" rx="12" ry="4" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Cylinder body -->
  <line x1="4" y1="6" x2="4" y2="24" stroke="currentColor" stroke-width="2"/>
  <line x1="28" y1="6" x2="28" y2="24" stroke="currentColor" stroke-width="2"/>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="16" cy="24" rx="12" ry="4" fill="currentColor" stroke="currentColor" stroke-width="2"/>
  <!-- Data bands -->
  <ellipse cx="16" cy="12" rx="12" ry="4" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3 2"/>
  <ellipse cx="16" cy="18" rx="12" ry="4" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Access port -->
  <rect x="13" y="4" width="6" height="4" rx="1" fill="currentColor"/>
</svg>