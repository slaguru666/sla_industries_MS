<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Main wall line heavy -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="currentColor" stroke-width="4"/>
  <!-- Wall battlements (top) -->
  <rect x="5"  y="10" width="4" height="6" fill="currentColor"/>
  <rect x="13" y="10" width="4" height="6" fill="currentColor"/>
  <rect x="21" y="10" width="4" height="6" fill="currentColor"/>
  <!-- Wall base foundation -->
  <rect x="3" y="20" width="26" height="4" rx="1" fill="currentColor" opacity="0.5"/>
  <!-- Door gap indicator -->
  <rect x="14" y="16" width="4" height="4" fill="currentColor" opacity="0"/>
  <line x1="14" y1="16" x2="14" y2="24" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <line x1="18" y1="16" x2="18" y2="24" stroke="currentColor" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
</svg>