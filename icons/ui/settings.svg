<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Hex gear outer -->
  <polygon points="16,2 27,8 27,20 16,26 5,20 5,8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Gear teeth on hex edges -->
  <polygon points="16,1 18,4 14,4" fill="currentColor"/>
  <polygon points="27.5,7.5 27,11 24.5,9.5" fill="currentColor"/>
  <polygon points="27.5,20.5 24.5,22.5 27,19" fill="currentColor"/>
  <polygon points="16,27 14,24 18,24" fill="currentColor"/>
  <polygon points="4.5,20.5 5,19 7.5,22.5" fill="currentColor"/>
  <polygon points="4.5,7.5 7.5,9.5 5,11" fill="currentColor"/>
  <!-- Inner hex cutout -->
  <polygon points="16,9 21,12 21,18 16,21 11,18 11,12" fill="currentColor"/>
  <!-- Center circle -->
  <circle cx="16" cy="15" r="3.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="16" cy="15" r="1.5" fill="currentColor"/>
</svg>