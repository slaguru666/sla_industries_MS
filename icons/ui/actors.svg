<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Badge shape -->
  <path d="M6,2 H26 L30,6 V30 H2 V6 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  <!-- Notch at top (lanyard hole) -->
  <rect x="13" y="0" width="6" height="4" rx="1" fill="currentColor"/>
  <!-- Head -->
  <circle cx="16" cy="12" r="4" fill="currentColor"/>
  <!-- Shoulders -->
  <path d="M8,26 C8,20 24,20 24,26" fill="currentColor"/>
  <!-- ID stripe at bottom -->
  <rect x="5" y="26" width="22" height="2" fill="currentColor" opacity="0.5"/>
</svg>