<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Emitter housing -->
  <polygon points="12,6 20,6 22,12 10,12" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Lens circle -->
  <circle cx="16" cy="9" r="3" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- Beam spread (lower trapezoid) -->
  <polygon points="10,12 22,12 28,28 4,28" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Beam rays -->
  <line x1="16" y1="12" x2="16" y2="28" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <line x1="13" y1="12" x2="8"  y2="28" stroke="currentColor" stroke-width="1"/>
  <line x1="19" y1="12" x2="24" y2="28" stroke="currentColor" stroke-width="1"/>
  <!-- Mounting bracket -->
  <rect x="14" y="2" width="4" height="5" rx="1" fill="currentColor"/>
</svg>